<svg width="1600" height="1160" viewBox="0 0 1600 1160" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1600" height="1160" fill="#10141F"/>
  <rect x="32" y="32" width="1536" height="1096" rx="24" fill="#131A29" stroke="#24304A"/>
  <text x="72" y="92" fill="#F3F6FF" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="700">Scaling Agent Systems: When To Use What</text>
  <text x="72" y="126" fill="#9FB0D1" font-family="Inter, Arial, sans-serif" font-size="18">A practical reading of the paper: choose topology from task structure, environment dynamics, and coordination cost.</text>

  <rect x="72" y="168" width="1456" height="394" rx="18" fill="#111827" stroke="#2A3857"/>
  <text x="100" y="214" fill="#DCE6FF" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="700">Conditional Flow</text>

  <rect x="104" y="250" width="260" height="86" rx="16" fill="#173055" stroke="#4F8CFF" stroke-width="2"/>
  <text x="130" y="286" fill="#F3F6FF" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700">Start With The Task</text>
  <text x="130" y="314" fill="#C7D4F5" font-family="Inter, Arial, sans-serif" font-size="16">Look at dependency graph, tools,</text>
  <text x="130" y="336" fill="#C7D4F5" font-family="Inter, Arial, sans-serif" font-size="16">environment change, and baseline model.</text>

  <line x1="364" y1="293" x2="444" y2="293" stroke="#4F8CFF" stroke-width="3"/>
  <polygon points="444,293 428,285 428,301" fill="#4F8CFF"/>

  <rect x="444" y="214" width="308" height="124" rx="16" fill="#16202F" stroke="#3D4B68"/>
  <text x="472" y="252" fill="#F3F6FF" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700">Can the work be split into</text>
  <text x="472" y="280" fill="#F3F6FF" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700">real independent branches?</text>
  <text x="472" y="312" fill="#AAB9D8" font-family="Inter, Arial, sans-serif" font-size="16">If later steps depend heavily on exact</text>
  <text x="472" y="334" fill="#AAB9D8" font-family="Inter, Arial, sans-serif" font-size="16">earlier state, the answer is effectively no.</text>

  <line x1="598" y1="338" x2="598" y2="400" stroke="#FF8E5A" stroke-width="3"/>
  <polygon points="598,400 590,384 606,384" fill="#FF8E5A"/>
  <text x="614" y="378" fill="#FFB08A" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">No</text>

  <rect x="440" y="410" width="316" height="112" rx="16" fill="#3A1F22" stroke="#FF8E5A"/>
  <text x="470" y="448" fill="#FFF1EB" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700">Use Single-Agent</text>
  <text x="470" y="478" fill="#FFD5C5" font-family="Inter, Arial, sans-serif" font-size="16">Best for sequential planning, fragile state,</text>
  <text x="470" y="500" fill="#FFD5C5" font-family="Inter, Arial, sans-serif" font-size="16">and long chains where handoffs lose signal.</text>

  <line x1="752" y1="276" x2="860" y2="276" stroke="#59D499" stroke-width="3"/>
  <polygon points="860,276 844,268 844,284" fill="#59D499"/>
  <text x="780" y="262" fill="#8CF0BC" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">Yes</text>

  <rect x="860" y="214" width="300" height="124" rx="16" fill="#16202F" stroke="#3D4B68"/>
  <text x="888" y="252" fill="#F3F6FF" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700">Does the environment change</text>
  <text x="888" y="280" fill="#F3F6FF" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700">during execution?</text>
  <text x="888" y="312" fill="#AAB9D8" font-family="Inter, Arial, sans-serif" font-size="16">Browsing, ops, monitoring, and live tool</text>
  <text x="888" y="334" fill="#AAB9D8" font-family="Inter, Arial, sans-serif" font-size="16">feedback usually mean yes.</text>

  <line x1="1010" y1="338" x2="1010" y2="400" stroke="#59D499" stroke-width="3"/>
  <polygon points="1010,400 1002,384 1018,384" fill="#59D499"/>
  <text x="1026" y="378" fill="#8CF0BC" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">Yes</text>

  <rect x="852" y="410" width="316" height="112" rx="16" fill="#142B24" stroke="#59D499"/>
  <text x="882" y="448" fill="#ECFFF6" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700">Use Decentralized Or Hybrid</text>
  <text x="882" y="478" fill="#C7F5DF" font-family="Inter, Arial, sans-serif" font-size="16">Local adaptation matters more than rigid</text>
  <text x="882" y="500" fill="#C7F5DF" font-family="Inter, Arial, sans-serif" font-size="16">planner control, but protocol design matters.</text>

  <line x1="1160" y1="276" x2="1260" y2="276" stroke="#4F8CFF" stroke-width="3"/>
  <polygon points="1260,276 1244,268 1244,284" fill="#4F8CFF"/>
  <text x="1186" y="262" fill="#AFCBFF" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">No</text>

  <rect x="1260" y="214" width="220" height="124" rx="16" fill="#16202F" stroke="#3D4B68"/>
  <text x="1288" y="252" fill="#F3F6FF" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700">Need strong</text>
  <text x="1288" y="280" fill="#F3F6FF" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700">global synthesis?</text>
  <text x="1288" y="312" fill="#AAB9D8" font-family="Inter, Arial, sans-serif" font-size="16">Broad research, evidence merge,</text>
  <text x="1288" y="334" fill="#AAB9D8" font-family="Inter, Arial, sans-serif" font-size="16">document comparison.</text>

  <line x1="1370" y1="338" x2="1370" y2="400" stroke="#4F8CFF" stroke-width="3"/>
  <polygon points="1370,400 1362,384 1378,384" fill="#4F8CFF"/>
  <text x="1388" y="378" fill="#AFCBFF" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">Yes</text>

  <rect x="1210" y="410" width="316" height="112" rx="16" fill="#173055" stroke="#4F8CFF"/>
  <text x="1240" y="448" fill="#F3F6FF" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700">Use Centralized Planner-Worker</text>
  <text x="1240" y="478" fill="#C7D4F5" font-family="Inter, Arial, sans-serif" font-size="16">Best when the planner can assign clean,</text>
  <text x="1240" y="500" fill="#C7D4F5" font-family="Inter, Arial, sans-serif" font-size="16">bounded scopes and validate outputs.</text>

  <rect x="104" y="590" width="1456" height="486" rx="18" fill="#111827" stroke="#2A3857"/>
  <text x="100" y="636" fill="#DCE6FF" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="700">Main Architectures And How They Look</text>

  <rect x="116" y="668" width="292" height="352" rx="18" fill="#151D2D" stroke="#3C4C6D"/>
  <text x="144" y="708" fill="#F3F6FF" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700">Single-Agent</text>
  <text x="144" y="734" fill="#AAB9D8" font-family="Inter, Arial, sans-serif" font-size="16">One reasoning loop owns planning, tools,</text>
  <text x="144" y="756" fill="#AAB9D8" font-family="Inter, Arial, sans-serif" font-size="16">memory, and final answer.</text>
  <rect x="188" y="806" width="144" height="76" rx="18" fill="#3A1F22" stroke="#FF8E5A" stroke-width="2"/>
  <text x="235" y="851" fill="#FFF1EB" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700">Agent</text>
  <line x1="260" y1="882" x2="260" y2="936" stroke="#FF8E5A" stroke-width="3"/>
  <polygon points="260,936 252,920 268,920" fill="#FF8E5A"/>
  <rect x="176" y="936" width="168" height="48" rx="12" fill="#222C41" stroke="#5B7099"/>
  <text x="207" y="967" fill="#DCE6FF" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">Tools / Memory</text>

  <rect x="430" y="668" width="292" height="352" rx="18" fill="#151D2D" stroke="#3C4C6D"/>
  <text x="458" y="708" fill="#F3F6FF" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700">Independent MAS</text>
  <text x="458" y="734" fill="#AAB9D8" font-family="Inter, Arial, sans-serif" font-size="16">Parallel workers do isolated work and</text>
  <text x="458" y="756" fill="#AAB9D8" font-family="Inter, Arial, sans-serif" font-size="16">only meet at the end.</text>
  <rect x="470" y="804" width="76" height="54" rx="16" fill="#142B24" stroke="#59D499" stroke-width="2"/>
  <rect x="540" y="870" width="76" height="54" rx="16" fill="#142B24" stroke="#59D499" stroke-width="2"/>
  <rect x="610" y="804" width="76" height="54" rx="16" fill="#142B24" stroke="#59D499" stroke-width="2"/>
  <text x="489" y="837" fill="#ECFFF6" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">A1</text>
  <text x="559" y="903" fill="#ECFFF6" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">A2</text>
  <text x="629" y="837" fill="#ECFFF6" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">A3</text>
  <line x1="508" y1="858" x2="576" y2="958" stroke="#59D499" stroke-width="3"/>
  <line x1="648" y1="858" x2="576" y2="958" stroke="#59D499" stroke-width="3"/>
  <line x1="578" y1="924" x2="578" y2="958" stroke="#59D499" stroke-width="3"/>
  <rect x="500" y="958" width="156" height="44" rx="12" fill="#222C41" stroke="#5B7099"/>
  <text x="537" y="986" fill="#DCE6FF" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">Aggregator</text>

  <rect x="744" y="668" width="292" height="352" rx="18" fill="#151D2D" stroke="#3C4C6D"/>
  <text x="772" y="708" fill="#F3F6FF" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700">Centralized MAS</text>
  <text x="772" y="734" fill="#AAB9D8" font-family="Inter, Arial, sans-serif" font-size="16">Planner owns decomposition, routing,</text>
  <text x="772" y="756" fill="#AAB9D8" font-family="Inter, Arial, sans-serif" font-size="16">and final synthesis.</text>
  <rect x="850" y="788" width="86" height="56" rx="16" fill="#173055" stroke="#4F8CFF" stroke-width="2"/>
  <text x="872" y="822" fill="#F3F6FF" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">Mgr</text>
  <line x1="892" y1="844" x2="812" y2="910" stroke="#4F8CFF" stroke-width="3"/>
  <line x1="892" y1="844" x2="892" y2="910" stroke="#4F8CFF" stroke-width="3"/>
  <line x1="892" y1="844" x2="972" y2="910" stroke="#4F8CFF" stroke-width="3"/>
  <rect x="770" y="910" width="84" height="50" rx="14" fill="#142B24" stroke="#59D499" stroke-width="2"/>
  <rect x="850" y="910" width="84" height="50" rx="14" fill="#142B24" stroke="#59D499" stroke-width="2"/>
  <rect x="930" y="910" width="84" height="50" rx="14" fill="#142B24" stroke="#59D499" stroke-width="2"/>
  <text x="799" y="942" fill="#ECFFF6" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">W1</text>
  <text x="879" y="942" fill="#ECFFF6" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">W2</text>
  <text x="959" y="942" fill="#ECFFF6" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">W3</text>

  <rect x="1058" y="668" width="232" height="352" rx="18" fill="#151D2D" stroke="#3C4C6D"/>
  <text x="1086" y="708" fill="#F3F6FF" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700">Decentralized MAS</text>
  <text x="1086" y="734" fill="#AAB9D8" font-family="Inter, Arial, sans-serif" font-size="16">Peers update one another directly.</text>
  <circle cx="1174" cy="832" r="36" fill="#142B24" stroke="#59D499" stroke-width="2"/>
  <circle cx="1124" cy="910" r="36" fill="#142B24" stroke="#59D499" stroke-width="2"/>
  <circle cx="1224" cy="910" r="36" fill="#142B24" stroke="#59D499" stroke-width="2"/>
  <text x="1160" y="839" fill="#ECFFF6" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">A1</text>
  <text x="1110" y="917" fill="#ECFFF6" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">A2</text>
  <text x="1210" y="917" fill="#ECFFF6" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">A3</text>
  <line x1="1160" y1="864" x2="1140" y2="882" stroke="#59D499" stroke-width="3"/>
  <line x1="1188" y1="864" x2="1208" y2="882" stroke="#59D499" stroke-width="3"/>
  <line x1="1160" y1="910" x2="1188" y2="910" stroke="#59D499" stroke-width="3"/>

  <rect x="1312" y="668" width="216" height="352" rx="18" fill="#151D2D" stroke="#3C4C6D"/>
  <text x="1340" y="708" fill="#F3F6FF" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700">Hybrid MAS</text>
  <text x="1340" y="734" fill="#AAB9D8" font-family="Inter, Arial, sans-serif" font-size="16">Manager plus selective peer repair.</text>
  <rect x="1385" y="788" width="72" height="48" rx="14" fill="#173055" stroke="#4F8CFF" stroke-width="2"/>
  <text x="1403" y="818" fill="#F3F6FF" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">Mgr</text>
  <line x1="1421" y1="836" x2="1372" y2="900" stroke="#4F8CFF" stroke-width="3"/>
  <line x1="1421" y1="836" x2="1470" y2="900" stroke="#4F8CFF" stroke-width="3"/>
  <rect x="1334" y="900" width="76" height="50" rx="14" fill="#142B24" stroke="#59D499" stroke-width="2"/>
  <rect x="1432" y="900" width="76" height="50" rx="14" fill="#142B24" stroke="#59D499" stroke-width="2"/>
  <text x="1360" y="932" fill="#ECFFF6" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">W1</text>
  <text x="1458" y="932" fill="#ECFFF6" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">W2</text>
  <line x1="1410" y1="926" x2="1432" y2="926" stroke="#59D499" stroke-width="3"/>

  <text x="116" y="1058" fill="#9FB0D1" font-family="Inter, Arial, sans-serif" font-size="16">Rule of thumb: start with the single-agent baseline. Only add coordination when the task graph has real parallel slack or the environment changes fast enough to justify it.</text>
</svg>
